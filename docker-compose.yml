services:
  db:
    image: postgres:16
    container_name: odoo18-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - odoo18-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  odoo:
    build: .
    image: odoo18-custom
    container_name: odoo18-web
    depends_on:
      db:
        condition: service_healthy
    ports:
      # - "${ODOO_PORT}:9000"
      - "9000:8069"
    environment:
      HOST: db
      USER: ${POSTGRES_USER}
      PASSWORD: ${POSTGRES_PASSWORD}
      WEB_DB_SELECTOR_BRAND_NAME: My Company
      WEB_DB_SELECTOR_BRAND_LOGO: /web_database_selector_branding/static/img/my_logo.png
    volumes:
      - odoo18-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    restart: unless-stopped

volumes:
  odoo18-db-data:
  odoo18-web-data:
